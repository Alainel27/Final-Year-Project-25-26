<!DOCTYPE html>

<html lang="en">
<head>
        <meta charset="UTF-8">
	<style>
                body{
                        margin: 0;
                        padding: 0;
                        font-family: Arial, Helvetica, sans-serif;
                        background-color:grey;
                        color: white;
                        text-align: center;
                }

                header {
                        padding: 30px;
                        background-color:darkslategray;
                }

                h1{
                        margin:0;
                        font-size: 32px;
                
                }

                main{
                        margin-top: 50px;
                
                }

                input {
                        width:300px;
                        padding: 12px;
                        font-size: 16px;
                        border:none;
                        border-radius: 4px;
                        margin-right: 10px;

                }

                button{
                        padding:12px 20px;
                        font-size: 16px;
                        border: none;
                        border-radius: 4px;
                        background-color: lightblue;
                        cursor: pointer;
                
                }

                button:hover{
                        background-color: antiquewhite;
                }
                #results{
                        margin: 40px auto;
                        width:80%;
                        max-width:700px;
                        background-color: black;
                        padding: 20px;
                        border-radius: 6px;
                        text-align: left;
                        display: none;
                }

                footer{
                        margin-top:60px;
                        padding:15px;
                        font-size: 14px;
                        color: aliceblue;
                }
        </style>
</head>

<body>

 <script>
        //runs when the user clicks the button
        //async function for when I use APIs
        async function analyseQuery() {
                //stores the value inputed by the user
                const query = document.getElementById("queryInput").value;
                //allows the page the update 
                const resultsDiv = document.getElementById("results");
                //if there is no query it will prompt this error message
                if (!query) {
                        alert("please enter a domain or IP")
                        return;
                }
                //displays a loading message to show that it is working
                resultsDiv.style.display = "block";
                resultsDiv.innerHTML = "<p>Analysing...</p>";
                
                        //sends to backend
                        try{
                                const response = await fetch(
                                        `http://localhost:3000/analyse?query=${query}`
                                );
                        

                const data = await response.json();

                //displaying the data
               resultsDiv.innerHTML = `
               <h3>Results</h3>
               <p><strong>Query:</strong> ${data.query}</p>
               <p><strong> IP Address:</strong> ${data.ip}</p>
                <p><strong>Risk Score:</strong> ${data.riskScore}</p>
                        `;

        } catch (error) {
                resultsDiv.innerHTML = "<p>Error Retrieving the data</p>"
        }
}
</script>

        <header>
                <h1>Domain IP</h1>
                <p>FYP</p>
        </header>

<main>
        <p>Enter Domain</p>
        <input type="text" id="queryInput" placeholder="8.8.8.8">
                <button onclick="analyseQuery()">Analyze</button>
                <div id="results">
                        <h3>Results</h3>
                        <p>Query results will appear here.</p>
                </div>
</main>
<footer>
        FYP
</footer>
</body>
        
</html>
